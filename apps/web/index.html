<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/image/favicon.svg" />
    <link rel="apple-touch-icon" href="/image/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Aajiveka — India's next-gen job portal connecting talented professionals with top employers. Search jobs, build resumes, and advance your career."
    />
    <meta name="theme-color" content="#005985" />
    <link rel="canonical" href="https://aajiveka.com/" />

    <!-- Open Graph defaults (overridden per-page by React 19 meta hoisting) -->
    <meta property="og:site_name" content="Aajiveka" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://aajiveka.com/image/og-default.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Preload hero banner (LCP image) -->
    <link rel="preload" as="image" href="/image/banner.jpg" />

    <!-- Fonts: Inter (body) + Jost (headings) — Latin subset only -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Jost:wght@400;500;600;700&display=swap&subset=latin"
      rel="stylesheet"
    />
    <title>Aajiveka | Your Ultimate Career Partner</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
