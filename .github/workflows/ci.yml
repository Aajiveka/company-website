name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: typecheck + lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The Prisma client is generated code — nothing typechecks without it.
      - run: npx prisma generate
        working-directory: apps/api
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  e2e:
    name: end-to-end (real database)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aajiveka
          POSTGRES_PASSWORD: aajiveka
          POSTGRES_DB: aajiveka
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U aajiveka"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      DATABASE_URL: postgresql://aajiveka:aajiveka@localhost:5432/aajiveka?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-only-access-secret-not-for-production-use
      JWT_REFRESH_SECRET: ci-only-refresh-secret-not-for-production-use

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Same reason as the static job: the client is generated code, and `migrate deploy`
      # does not emit it — it only applies migrations. Without this the build fails with
      # "@prisma/client has no exported member 'PrismaClient'" and a cascade of implicit-any
      # errors from the untyped rows and transaction callbacks.
      - run: npx prisma generate
        working-directory: apps/api

      - name: Apply migrations
        run: npx prisma migrate deploy
        working-directory: apps/api

      # migrate deploy creates the schema, not the rows. tests/e2e.mjs logs in as anuj,
      # anuj@aajiveka.com and qc1, which exist only under SEED_DEMO_USERS=1 — seed.ts says
      # as much: "They exist so CI (and a local dev) can log in".
      - name: Seed master data and demo users
        run: npm run db:seed
        working-directory: apps/api
        env:
          SEED_DEMO_USERS: '1'

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # vite preview has to run from apps/web. At the repo root there is no vite.config.ts and
      # no dist/, so it came up serving 404 — the port opened, wait-on waited for a 2xx that
      # never arrived, and the job died at the 60s timeout. The workspace script picks up
      # apps/web/vite.config.ts, which sets preview.port 5173 and the /api proxy the suite needs.
      - name: Start API and web
        run: |
          node apps/api/dist/main.js &
          npm run preview --workspace apps/web &
          npx wait-on -t 60000 http://localhost:4000/api/health http://localhost:5173/
        working-directory: .
        env:
          PORT: 4000

      # The suite drives every public page and all three roles against the real API.
      # It is the check that actually catches contract drift between web and api.
      - name: Run e2e
        run: node tests/e2e.mjs

  docker:
    name: docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
