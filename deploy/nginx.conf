# nginx add_header does NOT merge across levels: a location that declares any add_header
# drops every add_header inherited from the server block. The SPA fallback serves
# `location = /index.html`, so the security headers have to be repeated there or every page
# load loses them. They are defined once in this snippet and included where needed.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  location /api/ {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # File uploads are capped at 10 MB by the API; let them reach it.
    client_max_body_size 12m;
    proxy_read_timeout 60s;
  }

  # Hashed build assets are immutable.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
  }

  # index.html must never be cached, or a deploy leaves clients pinned to old asset hashes.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
  }

  # SPA: every unknown path is a client route, not a 404.
  location / {
    try_files $uri $uri/ /index.html;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
