services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aajiveka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-aajiveka}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-aajiveka}']
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-aajiveka}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aajiveka}?schema=public
      REDIS_URL: redis://redis:6379
      # No defaults in production — the API refuses to boot without these.
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env}
      CORS_ORIGIN: ${APP_URL:-http://localhost:8080}
      APP_URL: ${APP_URL:-http://localhost:8080}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      STORAGE_LOCAL_ROOT: /repo/storage
      S3_BUCKET: ${S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      TWOFACTOR_API_KEY: ${TWOFACTOR_API_KEY:-}
      # Payments. Without these, POST /payments/orders returns 400 rather than pretending.
      BILLDESK_BASE_URL: ${BILLDESK_BASE_URL:-https://api.billdesk.com}
      BILLDESK_CLIENT_ID: ${BILLDESK_CLIENT_ID:-}
      BILLDESK_MERCHANT_ID: ${BILLDESK_MERCHANT_ID:-}
      BILLDESK_SECRET_KEY: ${BILLDESK_SECRET_KEY:-}
    volumes:
      - uploads:/repo/storage
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '${WEB_PORT:-8080}:80'
    depends_on:
      api: { condition: service_healthy }
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
